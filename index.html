<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Mind VR - Meta Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; z-index: 10;
        }
        button {
            padding: 15px 30px; font-size: 1.5rem; background: #00ffcc; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>TRAP MIND 3D</h1>
        <p>Meta Quest 3 Browser VR</p>
        <button id="entervr">ENTER VR</button>
        <p style="font-size: 0.8rem; margin-top: 10px;">Left Stick: Move | A Button: Jump</p>
    </div>

    <!-- Load Three.js and VR Button -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let camera, scene, renderer, controller1, controller2;
        let playerGroup, playerVelocity = new THREE.Vector3();
        let isGrounded = false;
        let platforms = [];
        let traps = [];
        let moveSpeed = 0.08;
        let jumpForce = 0.15;
        let gravity = 0.006;

        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 2, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 2. Player Group (The VR Rig)
            playerGroup = new THREE.Group();
            playerGroup.position.set(0, 1.6, 5); // Start at human height
            scene.add(playerGroup);
            playerGroup.add(camera);

            // 3. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0x00ffcc, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // 4. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 5. VR Button Logic
            document.getElementById('entervr').addEventListener('click', async () => {
                if (navigator.xr) {
                    const sessionInit = { optionalFeatures: ['local-floor', 'bounded-floor'] };
                    const session = await navigator.xr.requestSession('immersive-vr', sessionInit);
                    renderer.xr.setSession(session);
                    document.getElementById('overlay').style.display = 'none';
                }
            });

            // 6. Build Level
            createLevel();

            // Handle Controllers
            controller1 = renderer.xr.getController(0);
            playerGroup.add(controller1);
            controller2 = renderer.xr.getController(1);
            playerGroup.add(controller2);
        }

        function createLevel() {
            // Start Platform
            addPlatform(0, 0, 5, 4, 4, 0x444444);

            // Trick Platforms (Vanish when touched)
            addPlatform(0, 1, 0, 3, 3, 0x888888, 'fake');
            addPlatform(0, 2, -5, 3, 3, 0x888888, 'moving');
            addPlatform(0, 3, -10, 4, 4, 0x00ffcc, 'goal');

            // Ground Abyss (Visual only)
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x050505 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -5;
            scene.add(ground);
        }

        function addPlatform(x, y, z, w, d, color, type = 'solid') {
            const geo = new THREE.BoxGeometry(w, 0.5, d);
            const mat = new THREE.MeshPhongMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.userData = { type: type, originalColor: color, active: true };
            scene.add(mesh);
            platforms.push(mesh);
        }

        function handleInput() {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (source.gamepad) {
                    const axes = source.gamepad.axes; // [x, y, z, w]
                    const buttons = source.gamepad.buttons;

                    // Left Stick Movement (Axes 2 and 3 usually)
                    if (source.handedness === 'left') {
                        const direction = new THREE.Vector3();
                        camera.getWorldDirection(direction);
                        direction.y = 0;
                        direction.normalize();

                        const side = new THREE.Vector3().crossVectors(camera.up, direction).normalize();
                        
                        // Forward/Back
                        playerGroup.position.addScaledVector(direction, -axes[3] * moveSpeed);
                        // Left/Right
                        playerGroup.position.addScaledVector(side, axes[2] * moveSpeed);
                    }

                    // A Button Jump (Button 4 or 5)
                    if (source.handedness === 'right' && buttons[4].pressed && isGrounded) {
                        playerVelocity.y = jumpForce;
                        isGrounded = false;
                    }
                }
            }
        }

        function updatePhysics() {
            // Gravity
            playerVelocity.y -= gravity;
            playerGroup.position.y += playerVelocity.y;

            isGrounded = false;

            // Collision Detection
            platforms.forEach(p => {
                const pBox = new THREE.Box3().setFromObject(p);
                const playerBox = new THREE.Box3().setFromCenterAndSize(
                    playerGroup.position, 
                    new THREE.Vector3(0.5, 2.0, 0.5)
                );

                if (playerBox.intersectsBox(pBox)) {
                    // Check if falling onto platform
                    if (playerVelocity.y < 0 && playerGroup.position.y > p.position.y) {
                        playerGroup.position.y = p.position.y + 0.25 + 0.8; // Adjust based on camera height
                        playerVelocity.y = 0;
                        isGrounded = true;

                        // Logic for "Fake" platforms
                        if (p.userData.type === 'fake' && p.userData.active) {
                            p.material.color.set(0xff3366);
                            setTimeout(() => {
                                p.visible = false;
                                p.userData.active = false;
                            }, 500);
                        }

                        // Logic for Goal
                        if (p.userData.type === 'goal') {
                            p.material.color.set(0xffffff);
                        }
                    }
                }
            });

            // Falling out of world
            if (playerGroup.position.y < -4) {
                playerGroup.position.set(0, 1.6, 5);
                playerVelocity.set(0, 0, 0);
                // Reset fake platforms
                platforms.forEach(p => { if(p.userData.type === 'fake') { p.visible = true; p.userData.active = true; p.material.color.set(p.userData.originalColor); }});
            }
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                handleInput();
                updatePhysics();

                // Moving platform logic
                platforms.forEach(p => {
                    if (p.userData.type === 'moving') {
                        p.position.x = Math.sin(clock.getElapsedTime()) * 3;
                    }
                });

                renderer.render(scene, camera);
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
